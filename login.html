<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusHealth | Secure Login</title>
    <link rel="stylesheet" href="style.css?v=6">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <div class="logo" style="justify-content: center; margin-bottom: 24px;">
            <i class="fas fa-hospital-symbol"></i>
            <span>Nexus<strong>Health</strong></span>
        </div>
        
        <h2 id="loginTitle" style="text-align: center; margin-bottom: 8px;">Secure Login</h2>
        <p id="loginSubtitle" style="text-align: center; color: var(--text-muted); margin-bottom: 32px;">Welcome back. Please enter your credentials.</p>

        <form id="loginForm">
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: 600; margin-bottom: 8px;">Email Address</label>
                <input type="email" id="email" required placeholder="name@example.com" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0;">
            </div>

            <div style="margin-bottom: 24px;">
                <label style="display: block; font-weight: 600; margin-bottom: 8px;">Password</label>
                <input type="password" id="password" required placeholder="••••••••" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0;">
            </div>

            <button type="submit" id="loginBtn" style="width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer;">Sign In</button>
            <div id="message" style="margin-top: 16px; text-align: center;"></div>
            
            <p id="registerLinkArea" style="margin-top: 24px; text-align: center; font-size: 0.95rem; color: var(--text-muted);">
                New to NexusHealth? <a href="register.html" style="color: var(--primary); font-weight: 700; text-decoration: none;">Create Account</a>
            </p>
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
