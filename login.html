<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Hospital | Secure Login</title>
    <link rel="stylesheet" href="style.css?v=elite_v1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <a href="index.html" style="display: inline-flex; align-items: center; gap: 8px; text-decoration: none; color: var(--primary); font-weight: 700; margin-bottom: 24px;">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>

        <div class="logo" style="justify-content: center; margin-bottom: 24px;">
            <i class="fas fa-hospital-symbol"></i>
            <span>Modern <strong>Hospital</strong></span>
        </div>
        
        <h2 id="loginTitle">Secure Login</h2>
        <p id="loginSubtitle" style="text-align: center; color: var(--text-muted); margin-bottom: 40px;">Welcome back. Please enter your credentials to access your portal.</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="name@example.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary" id="loginBtn" style="width: 100%; margin-top: 16px;">Sign In</button>
            <div id="message" style="margin-top: 16px; text-align: center;"></div>
            
            <p id="registerLinkArea" style="margin-top: 32px; text-align: center; font-size: 0.95rem; color: var(--text-muted);">
                New to Modern Hospital? <a href="register.html" style="color: var(--primary); font-weight: 700;">Create Account</a>
            </p>
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
