<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusHealth | Create Patient Account</title>
    <link rel="stylesheet" href="style.css?v=elite_v1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <a href="index.html" style="display: inline-flex; align-items: center; gap: 8px; text-decoration: none; color: var(--primary); font-weight: 700; margin-bottom: 24px;">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>

        <div class="logo" style="justify-content: center; margin-bottom: 24px;">
            <i class="fas fa-hospital-symbol"></i>
            <span>Modern <strong>Hospital</strong></span>
        </div>
        
        <h2>Join Our Community</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 40px;">Create your secure patient account to book appointments and view records.</p>

        <form id="registerForm">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label>Full Name</label>
                    <input type="text" id="userName" required placeholder="Enter your full name">
                </div>
                
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>

                <div class="form-group" style="grid-column: 1 / -1;">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Min 6 characters">
                </div>

                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" required placeholder="First Name">
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" required placeholder="Last Name">
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <select id="gender" required>
                        <option value="" disabled selected>Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dateOfBirth" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="regBtn" style="width: 100%; margin-top: 24px;">Create Account</button>
            <div id="message" style="margin-top: 16px; text-align: center;"></div>
            
            <p style="margin-top: 32px; text-align: center; font-size: 0.95rem; color: var(--text-muted);">
                Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 700;">Sign In</a>
            </p>
        </form>
    </div>

    <script src="register.js?v=2"></script>
</body>
</html>
